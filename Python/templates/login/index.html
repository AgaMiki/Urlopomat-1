{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie | Urlopomat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="glowny-kontener">
    <nav class="pasek-menu">
        <span class="logo">🌴 Urlopomat</span>
        <div>
            <a href="{% url 'urlop_dashboard' %}" class="przycisk-wyloguj">Powrót</a>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="karta login-card">
            <div class="tekst-srodek mb-4">
                <h3 class="kolor-glowny">Logowanie</h3>
                <p class="tekst-wyciszony">Wprowadź swoje dane, aby przejść do panelu</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="komunikat-blad">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="pole-formularza">
                    <label>Login</label>
                    <input type="text" name="email" placeholder="" required>
                </div>
                
                <div class="pole-formularza">
                    <label>Hasło</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-gradient w-100">
                    Zaloguj do systemu
                </button>
            </form>
        </div>
    </div>
</div>
<!--Błędy ({% if messages %}): Jeśli logowanie się nie uda, Python przesyła informację o błędzie, a pętla wyświetla ją w czerwonej ramce.

Formularz (<form method="POST">): Bezpiecznie pakuje wpisane dane i wysyła je do weryfikacji w Pythonie (views.py).

Klucz ({% csrf_token %}): Ukryty token zabezpieczający aplikację przed hakerskimi próbami podrobienia formularza.

Dane (name="email" / name="password"): Identyfikatory pól. Pod tymi nazwami Python odbiera w bazie wpisany login i hasło.

Blokada (required): Zmusza użytkownika do uzupełnienia obu pól przed kliknięciem przycisku.-->
</body>

</html>
