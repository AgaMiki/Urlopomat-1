<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie | Urlopomat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }
        .card { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .navbar-custom { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 12px; }
        .navbar-custom .nav-link, .navbar-custom .navbar-brand { color: white !important; }
        .login-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding-bottom: 100px; }
    </style>
</head>
<body class="p-4">

<div class="container d-flex flex-column h-100 flex-grow-1">
    <!-- GÓRNY PASEK: Urlopomat (Menu + Powrót) zgodnie z image_0ab5bf.png -->
    <nav class="navbar navbar-expand navbar-custom p-3 mb-4 shadow">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">🌴 Urlopomat</span>
            <div>
                <!-- Przycisk Powrót kierujący na stronę główną -->
                <a href="{% url 'urlop_dashboard' %}" class="btn btn-light fw-bold px-4">Powrót</a>
            </div>
        </div>
    </nav>

    <!-- SEKROREK LOGOWANIA (Wyśrodkowany box) -->
    <div class="login-container">
        <div class="card p-4 bg-white shadow-lg">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">Logowanie</h3>
                <p class="text-muted small">Wprowadź swoje dane, aby przejść do panelu</p>
            </div>

            <!-- Obsługa błędów Django -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger py-2 small">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <!-- Formularz logowania -->
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Adres e-mail</label>
                    <input type="email" name="email" class="form-control" placeholder="pracownik@firma.pl" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-semibold text-secondary">Hasło</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" style="background: #0d6efd; border: none;">
                    Zaloguj do systemu
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
