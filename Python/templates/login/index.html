<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie | Urlopomat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

<div class="container">
    <nav class="navbar navbar-dark bg-primary rounded p-3 mb-5 shadow-sm">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">🌴 Urlopomat</span>
            <div>
                <a href="{% url 'urlop_dashboard' %}" class="btn btn-light fw-bold px-4">Powrót</a>
            </div>
        </div>
    </nav>

    <div class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
        <div class="card p-4 bg-white border-0 shadow-sm" style="width: 100%; max-width: 400px;">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">Logowanie</h3>
                <p class="text-muted small">Wprowadź swoje dane, aby przejść do panelu</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger py-2 small">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Adres e-mail</label>
                    <input type="email" name="email" class="form-control" placeholder="pracownik@firma.pl" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-semibold text-secondary">Hasło</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold border-0">
                    Zaloguj do systemu
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
