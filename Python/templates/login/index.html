<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie | Urlopomat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; height: 100vh; display: flex; align-items: center; }
        .card { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-primary { background: #0d6efd; border: none; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card p-4">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">🌴 Urlopomat</h3>
            <p class="text-muted">Zarządzaj swoim czasem wolnym</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Adres e-mail</label>
                <input type="email" name="email" class="form-control" placeholder="pracownik@firma.pl" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Hasło</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Zaloguj do systemu</button>
        </form>
    </div>
</div>

</body>
</html>
