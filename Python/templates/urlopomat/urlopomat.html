<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Użytkownika | Urlopomat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

<div class="container">
    <nav class="navbar navbar-expand navbar-dark bg-primary rounded p-3 mb-4 shadow-sm">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">🌴 Urlopomat</span>
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link fw-semibold text-warning" href="{% url 'wnioski_page' %}">📋 Wnioski</a>
                </li>
            </ul>
            <div>
                <a href="{% url 'urlop_dashboard' %}" class="btn btn-light fw-bold px-4">Wyloguj</a>
            </div>
        </div>
    </nav>

    <form method="POST" action="#">
        {% csrf_token %}
        
        <div class="row g-4">
            <div class="col-md-5">
                <div class="card p-4 border-0 shadow-sm h-100">
                    <h4 class="fw-bold text-primary mb-3">👤 Dane użytkownika</h4>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Zalogowany jako:</label>
                        <p class="fs-5 fw-semibold text-dark mb-0">agata@wp.pl</p>
                    </div>
                    <hr>
                    <h5 class="fw-bold text-secondary mb-2">Krótkie informacje</h5>
                    <ul class="list-unstyled text-muted mb-0">
                        <li class="mb-2">📅 Pozostały urlop: <strong class="text-success">26 dni</strong></li>
                        <li class="mb-2">🏖️ Wnioski w procesie: <strong class="text-warning">0</strong></li>
                        <li>🏢 Dział: <strong class="text-dark">Zasoby Ludzkie (HR)</strong></li>
                    </ul>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card p-4 border-0 shadow-sm h-100">
                    <h4 class="fw-bold text-success mb-4">📅 Wybór terminu urlopu</h4>
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Data rozpoczęcia:</label>
                        <input type="date" name="data_start" class="form-control form-control-lg" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Data zakończenia:</label>
                        <input type="date" name="data_end" class="form-control form-control-lg" required>
                    </div>
                    
                    <div class="alert alert-info py-2 small mb-0">
                        Wybierz zakres dat za pomocą systemowego wybieraka.
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12 text-center">
                <div class="p-3 bg-white card border-0 shadow-sm d-inline-block px-5">
                    <button type="submit" class="btn btn-success btn-lg fw-bold px-5">
                        Zatwierdzenie wniosku
                    </button>
                </div>
            </div>
        </div>
        
    </form>
</div>

</body>
</html>
